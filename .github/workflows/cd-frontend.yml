name: Frontend CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'gradly-frontend/**'
      - '.github/workflows/cd-frontend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # port: ${{ secrets.SERVER_PORT }} # Uncomment if using a custom SSH port
          script: |
            # Navigate to the project directory on your server
            # Ensure the repository is already cloned on the server at this path
            cd /home/${{ secrets.EC2_USER }}/Gradly-frontend/gradly-frontend


            # Fetch the latest changes from origin and hard reset to main to bypass merge conflicts
            git fetch origin
            git reset --hard origin/main

            # Restore the .env file
            cp /tmp/gradly-frontend-env-backup .env || true
            # Export environment variables for the build (optional, alternatively use a .env file on the server)
            # We already have a .env file on the server containing VITE_API_URL and VITE_WS_URL.
            
            # Build and restart the docker containers
            # Stop and remove existing containers first to prevent 'ContainerConfig' errors 
            # with older versions of docker-compose on the EC2 instance
            docker-compose down
            docker-compose up -d --build

            # Clean up dangling images to free up space
            docker image prune -f
