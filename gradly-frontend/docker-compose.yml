version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # These build args pull from the .env file in the same directory,
        # or fall back to localhost if not provided.
        - VITE_API_URL=${VITE_API_URL}
        - VITE_WS_URL=${VITE_WS_URL}
    container_name: gradly-frontend
    ports:
      - "80:80"
    restart: unless-stopped
